<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; width: 100%; max-width: 440px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); padding: 40px; }
  h1 { font-size: 26px; color: #1e1b4b; margin-bottom: 6px; }
  p.sub { color: #6b7280; font-size: 15px; margin-bottom: 28px; }
  label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input, textarea { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; margin-bottom: 18px; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  textarea { resize: vertical; min-height: 90px; }
  button { width: 100%; padding: 14px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:hover { background: #4f46e5; }
</style>
</head>
<body>
  <div class="card">
    <!-- Replace the action URL below with your own Make.com webhook URL -->
    <form action="https://hook.YOUR-REGION.make.com/YOUR-WEBHOOK-ID" method="POST" target="sink">
      <h1>Get in touch</h1>
      <p class="sub">Fill out the form and our team will follow up shortly.</p>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Doe" required>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="jane@company.com" required>
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
      <button type="submit">Send message</button>
    </form>
  </div>
  <iframe name="sink" style="display:none"></iframe>
</body>
</html>
